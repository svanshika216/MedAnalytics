{% extends 'base.html' %}
{% block title %}Edit Patient - MedAnalytics{% endblock %}
{% block page_title %}Edit Patient{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Edit Patient</h2>
        <p>Update {{ patient.name }}'s information</p>
    </div>
    <a href="{{ url_for('patients.list_patients') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card" style="max-width: 620px;">
    <div class="card-body p-4">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ patient.name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="dob" class="form-control"
                           value="{{ patient.dob.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        {% for g in ['Male','Female','Other'] %}
                        <option {% if patient.gender == g %}selected{% endif %}>{{ g }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Blood Group</label>
                    <select name="blood_group" class="form-select">
                        <option value="">Unknown</option>
                        {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                        <option {% if patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Number</label>
                    <input type="text" name="contact" class="form-control"
                           value="{{ patient.contact }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2">{{ patient.address or '' }}</textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-circle me-2"></i>Save Changes
                </button>
                <a href="{{ url_for('patients.list_patients') }}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
