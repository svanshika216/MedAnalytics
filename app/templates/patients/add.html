{% extends 'base.html' %}
{% block title %}Register Patient - MedAnalytics{% endblock %}
{% block page_title %}Register Patient{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Register Patient</h2>
        <p>Add a new patient to the system</p>
    </div>
    <a href="{{ url_for('patients.list_patients') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card" style="max-width: 620px;">
    <div class="card-body p-4">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="e.g. Rahul Verma" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="dob" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="">Select gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Blood Group</label>
                    <select name="blood_group" class="form-select">
                        <option value="">Unknown</option>
                        {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                        <option>{{ bg }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Number</label>
                    <input type="text" name="contact" class="form-control"
                           placeholder="e.g. 9876543210" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Address <span class="text-muted fw-normal">(optional)</span></label>
                    <textarea name="address" class="form-control" rows="2"
                              placeholder="Street, City"></textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-person-plus me-2"></i>Register Patient
                </button>
                <a href="{{ url_for('patients.list_patients') }}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
