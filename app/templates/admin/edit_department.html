{% extends 'base.html' %}
{% block title %}Edit Department - MedAnalytics{% endblock %}
{% block page_title %}Edit Department{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Edit Department</h2>
        <p>Update department name</p>
    </div>
    <a href="{{ url_for('admin.departments') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card" style="max-width: 480px;">
    <div class="card-body p-4">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="form-label">Department Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ dept.name }}" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-circle me-2"></i>Save Changes
                </button>
                <a href="{{ url_for('admin.departments') }}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
