{% extends 'base.html' %}
{% block title %}Add User - MedAnalytics{% endblock %}
{% block page_title %}Add User{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Add User</h2>
        <p>Create a new system account</p>
    </div>
    <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card" style="max-width: 500px;">
    <div class="card-body p-4">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="e.g. dr.sharma" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Set initial password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-select" required
                        id="role-select" onchange="toggleDoctorField()">
                    <option value="">Select role</option>
                    <option value="doctor">Doctor</option>
                    <option value="receptionist">Receptionist</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="mb-4" id="doctor-field" style="display:none;">
                <label class="form-label">Link to Doctor Profile</label>
                <select name="doctor_id" class="form-select">
                    <option value="">Select doctor</option>
                    {% for doctor in doctors %}
                    <option value="{{ doctor.id }}">
                        Dr. {{ doctor.name }} ({{ doctor.department.name }})
                    </option>
                    {% endfor %}
                </select>
                <small class="text-muted">Only doctors without existing accounts shown.</small>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-person-plus me-2"></i>Create User
                </button>
                <a href="{{ url_for('admin.users') }}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% block extra_js %}
<script>
function toggleDoctorField() {
    const role = document.getElementById('role-select').value;
    document.getElementById('doctor-field').style.display =
        role === 'doctor' ? 'block' : 'none';
}
</script>
{% endblock %}
{% endblock %}
